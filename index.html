<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 style="text-align: center">Let's Play Rock Paper Scissors!</h1>
    <h2 style="text-align: center">
      Press Rock, Paper, or Scissors button to start the game
    </h2>
    <div id="game-panel">
      <ul id="play-button">
        <li>
          <button id="rock">ROCK 🪨</button>
        </li>
        <li>
          <button id="paper">PAPER 📜</button>
        </li>
        <li>
          <button id="scissors">SCISSORS ✂️</button>
        </li>
      </ul>
      <div id="score">
        <span>Scoreboard</span>
        <span class="score-detail"
          >Player: <span class="human-score"></span> vs Computer:
          <span class="computer-score"></span
        ></span>
      </div>
    </div>
  </body>
</html>
