<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="app.js" defer></script>
    <style>
      html {
        margin-left: 200px;
        margin-right: 200px;
        outline: 2px solid grey;
        box-sizing: border-box;
      }

      #game-panel {
        background-color: seashell;
        border: 2px solid lightseagreen;
        border-radius: 4px;
        width: 100%;
        height: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">Let's Play Rock Paper Scissors!</h1>
    <h2 style="text-align: center">
      Press Rock, Paper, or Scissors button to start the game
    </h2>
    <div id="game-panel">
      <ul style="list-style: none; display: flex; gap: 40px">
        <li>
          <button
            style="
              flex-basis: auto;
              width: 160px;
              height: auto;
              padding: 8px;
              margin-top: 12px;
              font-family: &quot;Courier New&quot;, Courier, monospace;
              font-size: large;
              font-weight: 600;
              background-color: gray;
              color: navy;
              border: 3px solid white;
              border-radius: 8px;
            "
          >
            ROCK 🪨
          </button>
        </li>
        <li>
          <button
            style="
              flex-basis: auto;
              width: 160px;
              height: auto;
              padding: 8px;
              margin-top: 12px;
              font-family: &quot;Courier New&quot;, Courier, monospace;
              font-size: large;
              font-weight: 600;
              background-color: whitesmoke;
              color: navy;
              border: 3px solid white;
              border-radius: 8px;
            "
          >
            PAPER 📜
          </button>
        </li>
        <li>
          <button
            style="
              flex-basis: auto;
              width: 160px;
              height: auto;
              padding: 8px;
              margin-top: 12px;
              font-family: &quot;Courier New&quot;, Courier, monospace;
              font-size: large;
              font-weight: 600;
              background-color: orange;
              color: navy;
              border: 3px solid white;
              border-radius: 8px;
            "
          >
            SCISSORS ✂️
          </button>
        </li>
      </ul>
    </div>
  </body>
</html>
